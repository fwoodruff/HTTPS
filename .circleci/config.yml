version: 2.1
# circleci local execute --config ./.circleci/config.yml test
jobs:
  test:
    docker:
      - image: gcc:14
    steps:
      - checkout
      - run:
          name: Install test dependencies
          command: |
            apt-get update && apt-get install -y python3-pip
            make test-deps
      - run:
          name: Build server
          command: |
            make -j$(nproc)
      - run:
          name: Run server
          command: |
            ./target/codeymccodeface
          background: true
      - run:
          name: Test server
          command: |
            timeout 30 bash -c 'until curl -sk https://localhost:8443 -o /dev/null; do sleep 0.1; done'
            curl -kv https://localhost:8443
            curl http://localhost:8080
            curl -kv --tlsv1.3 --http2 https://localhost:8443
            curl -kv --http2-prior-knowledge https://localhost:8443/final.html
            curl -kv --http1.1 https://localhost:8443/
            curl -kv --tlsv1.2 --tls-max 1.2 -H "Range: bytes=0-50, 60-299" https://localhost:8443
      - run:
          name: Run pytest integration tests
          command: |
            make test
      - run:
          name: Build and run benchmark
          command: |
            make bench
            ./target/bench_chacha
      - run:
          name: Test session tickets
          command: |
            echo -e "GET / HTTP/1.1\r\nHost: localhost\r\n\r\n" > request.txt
            cat request.txt | openssl s_client -connect localhost:8443 -tls1_3 -ign_eof -sess_out session.pem
            cat request.txt | openssl s_client -connect localhost:8443 -tls1_3 -sess_in session.pem 2>&1 | grep -q "Reused, TLSv1.3"

            # cat request.txt | openssl s_client -connect localhost:8443 -tls1_3 -sess_out session.pem
            # openssl s_client -connect localhost:8443 -tls1_3 -early_data request.txt -sess_in session.pem 2>&1 

  docker-build:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Build server binary
          command: |
            docker build --progress=plain -t containerymccontainerface -f Dockerfile.armv6 .
            c_id=$(docker create containerymccontainerface)
            mkdir -p target
            docker cp $c_id:/target/codeymccodeface target/codeymccodeface.armv6
            docker cp $c_id:/target/bench_chacha target/bench_chacha.armv6
            sudo docker rm -f "$c_id" >/dev/null
            test -x target/codeymccodeface.armv6
            test -x target/bench_chacha.armv6
      - persist_to_workspace:
          root: .
          paths:
            - target/codeymccodeface.armv6
            - target/bench_chacha.armv6

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - attach_workspace:
          at: .
      - add_ssh_keys
      - run:
          name: Install rsync
          command: |
            sudo apt-get update
            sudo apt-get install -y rsync
      - run:
          name: Copy binary to Raspberry Pi
          command: |
            scp -o StrictHostKeyChecking=no -o BatchMode=yes target/codeymccodeface.armv6 freddiewoodruff@freddiewoodruff.co.uk:~/doc/deploy/
            scp -o StrictHostKeyChecking=no -o BatchMode=yes target/bench_chacha.armv6 freddiewoodruff@freddiewoodruff.co.uk:~/doc/deploy/
            rsync -avz --delete resources/MIME/ freddiewoodruff@freddiewoodruff.co.uk:~/doc/deploy/resources/MIME/
            rsync -avz --delete resources/tld.txt freddiewoodruff@freddiewoodruff.co.uk:~/doc/deploy/resources/
            scp -o StrictHostKeyChecking=no live_config.txt freddiewoodruff@freddiewoodruff.co.uk:~/doc/deploy/config.txt
      - run:
          name: Restart server
          command: |
            ssh -o StrictHostKeyChecking=no freddiewoodruff@freddiewoodruff.co.uk '
              cd ~/doc/deploy;
              [ -f codey.pid ] && sudo kill $(cat codey.pid) || true;
              rm -f codey.pid;
              mv codeymccodeface.armv6 codeymccodeface
              mv bench_chacha.armv6 bench_chacha
              sudo sh -c "nohup ./codeymccodeface --config config.txt >codey.log 2>&1 < /dev/null & echo \$! > codey.pid"
            '

  deploy-dev:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - attach_workspace:
          at: .
      - add_ssh_keys
      - run:
          name: Install rsync
          command: |
            sudo apt-get update
            sudo apt-get install -y rsync
      - run:
          name: Copy binary and config to Raspberry Pi
          command: |
            scp -o StrictHostKeyChecking=no -o BatchMode=yes target/codeymccodeface.armv6 freddiewoodruff@freddiewoodruff.co.uk:~/doc/deploy/codeymccodeface.dev
            rsync -avz --delete resources/MIME/ freddiewoodruff@freddiewoodruff.co.uk:~/doc/deploy/resources/MIME/
            rsync -avz --delete resources/tld.txt freddiewoodruff@freddiewoodruff.co.uk:~/doc/deploy/resources/
            scp -o StrictHostKeyChecking=no dev_config.txt freddiewoodruff@freddiewoodruff.co.uk:~/doc/deploy/dev_config.txt
      - run:
          name: Restart dev server (ports 13080/13443)
          command: |
            ssh -o StrictHostKeyChecking=no freddiewoodruff@freddiewoodruff.co.uk '
              cd ~/doc/deploy;
              [ -f dev_codey.pid ] && sudo kill $(cat dev_codey.pid) 2>/dev/null || true;
              rm -f dev_codey.pid;
              chmod +x codeymccodeface.dev;
              sudo sh -c "nohup ./codeymccodeface.dev --config dev_config.txt > dev_codey.log 2>&1 < /dev/null & echo \$! > dev_codey.pid"
            '
      - run:
          name: Smoke-test dev deployment
          command: |
            ssh -o StrictHostKeyChecking=no freddiewoodruff@freddiewoodruff.co.uk '
              timeout 30 sh -c "until curl -sk --max-time 2 https://localhost:13443/ -o /dev/null; do sleep 0.5; done"
              status=$(curl -sk --max-time 5 -o /dev/null -w "%{http_code}" https://localhost:13443/index.html)
              echo "HTTPS status: $status"
              [ "$status" = "200" ]
              curl -sk --max-time 5 https://localhost:13443/index.html | grep -qi "html"
              redir=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" http://localhost:13080/)
              echo "HTTP redirect status: $redir"
              [ "$redir" = "301" ]
            '

workflows:
  build_and_deploy:
    jobs:
      - test
      - docker-build
      - deploy:
          requires:
            - test
            - docker-build
          filters:
            branches:
              only:
                - main
      - deploy-dev:
          requires:
            - test
            - docker-build
          filters:
            branches:
              ignore:
                - main
